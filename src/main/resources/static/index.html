<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local File Sharing Platform</title>
    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2a794b;
            --background-color: #f5f5f5;
            --text-color: #333;
            --card-background: white;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            line-height: 1.6;
            background-color: var(--background-color);
            color: var(--text-color);
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background-color: var(--primary-color);
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .sidebar-logo {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 30px;
            text-align: center;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li {
            margin-bottom: 15px;
        }

        .sidebar-menu button {
            width: 100%;
            background: none;
            border: none;
            color: white;
            text-align: left;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .sidebar-menu button:hover {
            background-color: rgba(255,255,255,0.2);
        }

        .main-content {
            flex-grow: 1;
            padding: 20px;
            background-color: var(--background-color);
            overflow-y: auto;
        }

        .card {
            background-color: var(--card-background);
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .btn {
            display: inline-block;
            padding: 10px 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #2980b9;
        }

        .btn-secondary {
            background-color: var(--secondary-color);
        }

        .btn-secondary:hover {
            background-color: #27ae60;
        }

        .file-table {
            width: 100%;
            border-collapse: collapse;
        }

        .file-table th, .file-table td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        .file-table th {
            background-color: #f2f2f2;
        }

        .hidden {
            display: none !important;
        }

        .search-container {
            display: flex;
            margin-bottom: 20px;
        }

        .search-container input {
            flex-grow: 1;
            margin-right: 10px;
        }

        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                flex-direction: row;
                align-items: center;
            }

            .sidebar-logo {
                margin-bottom: 0;
                margin-right: 20px;
            }

            .sidebar-menu {
                display: flex;
                flex-grow: 1;
            }

            .sidebar-menu li {
                margin-bottom: 0;
                margin-right: 15px;
            }
        }

        #notification-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            max-width: 300px;
        }

        .notification {
            background-color: #f1f1f1;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: slideIn 0.3s ease-out;
        }

        .notification.success {
            background-color: var(--secondary-color);
            color: white;
        }

        .notification.error {
            background-color: #e74c3c;
            color: white;
        }

        .notification-close {
            background: none;
            border: none;
            color: inherit;
            font-size: 20px;
            cursor: pointer;
            padding: 0 10px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideOut {
            from {
                opacity: 1;
                transform: translateX(0);
            }
            to {
                opacity: 0;
                transform: translateX(100%);
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-logo">LFSP</div>
            <ul class="sidebar-menu">
                <li><button id="btn-login-sidebar">Login</button></li>
                <li><button id="btn-register-sidebar">Register</button></li>
                <li><button id="btn-files-sidebar">My Files</button></li>
                <li><button id="btn-public-sidebar">Public Files</button></li>
            </ul>
        </div>

        <div id="notification-container"></div>

        <!-- Main Content Area -->
        <div class="main-content">
            <!-- Login Section -->
            <section id="login-section" class="card hidden">
                <h2>Login to LFSP</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-username">Username</label>
                        <input type="text" id="login-username" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn">Login</button>
                </form>
            </section>

            <!-- Registration Section -->
            <section id="register-section" class="card hidden">
                <h2>Create Account</h2>
                <form id="register-form">
                    <div class="form-group">
                        <label for="register-username">Username</label>
                        <input type="text" id="register-username" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="register-password">Password</label>
                        <input type="password" id="register-password" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="confirm-password">Confirm Password</label>
                        <input type="password" id="confirm-password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn">Register</button>
                </form>
            </section>

            <!-- File Management Section -->
            <section id="file-management-section" class="hidden">
                <div class="card">
                    <h2>My Files</h2>
                    <div id="upload-section">
                        <input type="file" id="file-upload" multiple>
                        <button id="btn-upload" class="btn btn-secondary">Upload Files</button>
                    </div>
                </div>

                <div class="card">
                    <h3>File List</h3>
                    <table class="file-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Type</th>
                                <th>Size</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="file-table-body">
                            <!-- Dynamically populated rows -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Public Files Section -->
            <section id="public-files-section" class="card hidden">
                <h2>Public Files</h2>
                <div class="search-container">
                    <input type="text" id="search-user" placeholder="Search files by username" class="form-control">
                    <button id="btn-search" class="btn">Search</button>
                </div>
                <div id="public-file-list">
                    <!-- Dynamically populated public files -->
                </div>
            </section>
        </div>
    </div>

    <script>
        const state = {
            isAuthenticated: false,
            currentUser: null,
            token: null
        };
        
        const sections = {
            login: document.getElementById('login-section'),
            register: document.getElementById('register-section'),
            fileManagement: document.getElementById('file-management-section'),
            publicFiles: document.getElementById('public-files-section')
        };
        
        const buttons = {
            loginSidebar: document.getElementById('btn-login-sidebar'),
            registerSidebar: document.getElementById('btn-register-sidebar'),
            filesSidebar: document.getElementById('btn-files-sidebar'),
            publicSidebar: document.getElementById('btn-public-sidebar')
        };
        
        const backendUrl = "http://localhost:8080/api"; // Replace with your backend URL
        
        // Create a notification system
        const NotificationManager = {
            container: document.getElementById('notification-container'),
            
            show: function(message, type = 'info', duration = 3000) {
                // Create notification element
                const notification = document.createElement('div');
                notification.classList.add('notification');
                
                // Add type-specific class
                if (type === 'success') {
                    notification.classList.add('success');
                } else if (type === 'error') {
                    notification.classList.add('error');
                }
                
                // Create notification content
                const messageSpan = document.createElement('span');
                messageSpan.textContent = message;
                
                // Create close button
                const closeButton = document.createElement('button');
                closeButton.textContent = '×';
                closeButton.classList.add('notification-close');
                closeButton.addEventListener('click', () => this.remove(notification));
                
                // Append elements
                notification.appendChild(messageSpan);
                notification.appendChild(closeButton);
                
                // Add to container
                this.container.appendChild(notification);
                
                // Auto-remove after duration
                if (duration > 0) {
                    setTimeout(() => this.remove(notification), duration);
                }
            },
            
            remove: function(notification) {
                notification.style.animation = 'slideOut 0.3s ease-out';
                notification.addEventListener('animationend', () => {
                    notification.remove();
                });
            },
            
            success: function(message, duration = 3000) {
                this.show(message, 'success', duration);
            },
            
            error: function(message, duration = 3000) {
                this.show(message, 'error', duration);
            }
        };
        
        function hideAllSections() {
            Object.values(sections).forEach(section => section.classList.add('hidden'));
        }
        
        function showSection(section) {
            hideAllSections();
            section.classList.remove('hidden');
        }
        
        async function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value.trim();
        
            if (!username || !password) {
                NotificationManager.error('Please fill out all fields.');
                return;
            }
        
            try {
                const response = await fetch(`${backendUrl}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
        
                if (response.ok) {
                    const data = await response.json();
                    state.isAuthenticated = true;
                    state.currentUser = username;
                    state.token = data.token;
                    NotificationManager.success('Login successful!');
                    updateUIAfterLogin();
                } else if (response.status === 401) {
                    NotificationManager.error('Invalid credentials. Please try again.');
                } else {
                    NotificationManager.error('An error occurred while logging in. Please try again later.');
                }
            } catch (error) {
                console.error('Network error during login:', error);
                NotificationManager.error('Unable to connect to the server. Please check your network connection.');
            }
        }
        
        async function handleRegister(event) {
            event.preventDefault();
            const username = document.getElementById('register-username').value.trim();
            const password = document.getElementById('register-password').value.trim();
            const confirmPassword = document.getElementById('confirm-password').value.trim();
        
            if (!username || !password || !confirmPassword) {
                NotificationManager.error('Please fill out all fields.');
                return;
            }
        
            if (password !== confirmPassword) {
                NotificationManager.error('Passwords do not match.');
                return;
            }
        
            try {
                const response = await fetch(`${backendUrl}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
        
                if (response.ok) {
                    NotificationManager.success('Registration successful. You can now log in.');
                    showSection(sections.login);
                } else if (response.status === 400) {
                    const errorData = await response.json();
                    NotificationManager.error(`Registration failed: ${errorData.message}`);
                } else {
                    NotificationManager.error('An error occurred during registration. Please try again later.');
                }
            } catch (error) {
                console.error('Network error during registration:', error);
                NotificationManager.error('Unable to connect to the server. Please check your network connection.');
            }
        }
        
        async function populateFileTable() {
            const tableBody = document.getElementById('file-table-body');
            tableBody.innerHTML = '';
        
            try {
                const response = await fetch(`${backendUrl}/files`, {
                    headers: { Authorization: `Bearer ${state.token}` }
                });
        
                if (response.ok) {
                    const files = await response.json();
                    if (files.length === 0) {
                        tableBody.innerHTML = '<tr><td colspan="4">No files found.</td></tr>';
                    } else {
                        files.forEach(file => {
                            const row = tableBody.insertRow();
                            row.innerHTML = `
                                <td>${file.name}</td>
                                <td>${file.type}</td>
                                <td>${file.size}</td>
                                <td>
                                    <button onclick="downloadFile('${file.id}')" class="btn">Download</button>
                                    <button onclick="deleteFile('${file.id}')" class="btn">Delete</button>
                                </td>
                            `;
                        });
                    }
                } else {
                    NotificationManager.error('Failed to fetch files. Please try again later.');
                }
            } catch (error) {
                console.error('Network error while fetching files:', error);
                NotificationManager.error('Unable to connect to the server. Please check your network connection.');
            }
        }
        
        async function handleFileUpload() {
            const fileInput = document.getElementById('file-upload');
            const files = fileInput.files;
        
            if (files.length === 0) {
                NotificationManager.error('Please select at least one file to upload.');
                return;
            }
        
            const formData = new FormData();
            Array.from(files).forEach(file => formData.append('files', file));
        
            try {
                const response = await fetch(`${backendUrl}/files/upload`, {
                    method: 'POST',
                    headers: { Authorization: `Bearer ${state.token}` },
                    body: formData
                });
        
                if (response.ok) {
                    NotificationManager.success('Files uploaded successfully.');
                    populateFileTable();
                } else if (response.status === 413) {
                    NotificationManager.error('File size exceeds the allowed limit.');
                } else {
                    NotificationManager.error('Failed to upload files. Please try again later.');
                }
            } catch (error) {
                console.error('Network error while uploading files:', error);
                NotificationManager.error('Unable to connect to the server. Please check your network connection.');
            }
        }
        
        async function searchPublicFiles() {
            const username = document.getElementById('search-user').value.trim();
            const publicFileList = document.getElementById('public-file-list');
        
            if (!username) {
                NotificationManager.error('Please enter a username to search.');
                return;
            }
        
            publicFileList.innerHTML = '';
        
            try {
                const response = await fetch(`${backendUrl}/public-files?username=${username}`);
        
                if (response.ok) {
                    const files = await response.json();
                    if (files.length === 0) {
                        publicFileList.innerHTML = '<p>No public files found for this user.</p>';
                        NotificationManager.error('No public files found for this user.');
                    } else {
                        publicFileList.innerHTML = files.map(file => `
                            <div class="card">
                                <h3>${file.username}'s Files</h3>
                                <ul>
                                    <li>${file.name} (${file.type})</li>
                                </ul>
                            </div>
                        `).join('');
                        NotificationManager.success(`Found ${files.length} public files.`);
                    }
                } else {
                    NotificationManager.error('Failed to search public files. Please try again later.');
                }
            } catch (error) {
                console.error('Network error while searching public files:', error);
                NotificationManager.error('Unable to connect to the server. Please check your network connection.');
            }
        }
        
        async function downloadFile(fileId) {
            try {
                const response = await fetch(`${backendUrl}/files/download/${fileId}`, {
                    method: 'GET',
                    headers: { Authorization: `Bearer ${state.token}` }
                });
        
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = "downloaded-file";
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    window.URL.revokeObjectURL(url);
                    NotificationManager.success('File downloaded successfully.');
                } else {
                    NotificationManager.error('Failed to download file. Please try again later.');
                }
            } catch (error) {
                console.error('Network error while downloading file:', error);
                NotificationManager.error('Unable to connect to the server. Please check your network connection.');
            }
        }
        
        async function deleteFile(fileId) {
            try {
                const response = await fetch(`${backendUrl}/files/${fileId}`, {
                    method: 'DELETE',
                    headers: { Authorization: `Bearer ${state.token}` }
                });
        
                if (response.ok) {
                    NotificationManager.success('File deleted successfully.');
                    populateFileTable();
                } else {
                    NotificationManager.error('Failed to delete file. Please try again later.');
                }
            } catch (error) {
                console.error('Network error while deleting file:', error);
                NotificationManager.error('Unable to connect to the server. Please check your network connection.');
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            buttons.loginSidebar.addEventListener('click', () => showSection(sections.login));
            buttons.registerSidebar.addEventListener('click', () => showSection(sections.register));
            buttons.filesSidebar.addEventListener('click', () => showSection(sections.fileManagement));
            buttons.publicSidebar.addEventListener('click', () => showSection(sections.publicFiles));
        
            document.getElementById('login-form').addEventListener('submit', handleLogin);
            document.getElementById('register-form').addEventListener('submit', handleRegister);
            document.getElementById('btn-upload').addEventListener('click', handleFileUpload);
            document.getElementById('btn-search').addEventListener('click', searchPublicFiles);
        });
        
        function updateUIAfterLogin() {
            showSection(sections.fileManagement);
            populateFileTable();
        }
    </script>
    </body>
</html>
