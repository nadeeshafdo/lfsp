<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local File Sharing Platform</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-logo">LFSP</div>
            <ul class="sidebar-menu">
                <li><button id="btn-login-sidebar">Login</button></li>
                <li><button id="btn-register-sidebar">Register</button></li>
                <li><button id="btn-files-sidebar">My Files</button></li>
                <li><button id="btn-public-sidebar">Public Files</button></li>
            </ul>
        </div>

        <div id="notification-container"></div>

        <!-- Main Content Area -->
        <div class="main-content">
            <!-- Login Section -->
            <section id="login-section" class="card hidden">
                <h2>Login to LFSP</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-username">Username</label>
                        <input type="text" id="login-username" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn">Login</button>
                </form>
            </section>

            <!-- Registration Section -->
            <section id="register-section" class="card hidden">
                <h2>Create Account</h2>
                <form id="register-form">
                    <div class="form-group">
                        <label for="register-username">Username</label>
                        <input type="text" id="register-username" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="register-password">Password</label>
                        <input type="password" id="register-password" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="confirm-password">Confirm Password</label>
                        <input type="password" id="confirm-password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn">Register</button>
                </form>
            </section>

            <!-- File Management Section -->
            <section id="file-management-section" class="hidden">
                <div class="card">
                    <h2>My Files</h2>
                    <div id="upload-section">
                        <input type="file" id="file-upload" multiple>
                        <button id="btn-upload" class="btn btn-secondary">Upload Files</button>
                    </div>
                </div>

                <div class="card">
                    <h3>File List</h3>
                    <table class="file-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Type</th>
                                <th>Size</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="file-table-body">
                            <!-- Dynamically populated rows -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Public Files Section -->
            <section id="public-files-section" class="card hidden">
                <h2>Public Files</h2>
                <div class="search-container">
                    <input type="text" id="search-user" placeholder="Search files by username" class="form-control">
                    <button id="btn-search" class="btn">Search</button>
                </div>
                <div id="public-file-list">
                    <!-- Dynamically populated public files -->
                </div>
            </section>
        </div>
    </div>
    <script src="./scripts.js"></script>
    </body>
</html>
